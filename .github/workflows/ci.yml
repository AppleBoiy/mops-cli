name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libsqlite3-dev curl git

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-timeout

      - name: Build mops
        run: |
          make clean
          make -j2

      - name: Run tests
        run: pytest -q tests

      - name: Upload task logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mops-task-logs
          path: /tmp/mops_task_*.log
          if-no-files-found: ignore

  debian-build-and-test:
    runs-on: ubuntu-latest
    container:
      image: debian:stable
    defaults:
      run:
        working-directory: .

    steps:
      - name: Install system dependencies (container)
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            ca-certificates git curl build-essential libsqlite3-dev python3 python3-pip python3-venv
          update-ca-certificates || true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up virtualenv and install Python dependencies
        run: |
          python3 -m venv .venv
          ./.venv/bin/pip install --upgrade pip
          ./.venv/bin/pip install pytest pytest-timeout

      - name: Build mops
        run: |
          make clean
          make -j2

      - name: Run tests
        run: ./.venv/bin/pytest -q tests

      - name: Upload task logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mops-task-logs-debian
          path: /tmp/mops_task_*.log
          if-no-files-found: ignore
